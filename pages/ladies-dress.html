<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladies Dress - ShopZone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <span><i class="fas fa-truck"></i> Free Shipping on orders over ৳500</span>
            </div>
            <div class="top-bar-right">
                <a href="#"><i class="fas fa-user"></i> Login</a>
                <a href="#"><i class="fas fa-user-plus"></i> Register</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">
                    <span class="logo-text">Shop<span class="logo-highlight">Zone</span></span>
                </a>
                <div class="search-bar">
                    <input type="text" placeholder="Search ladies dresses..." id="searchInput">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Navigation -->
    <nav class="category-nav">
        <div class="container">
            <ul class="nav-list">
                <li><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="phone-covers.html"><i class="fas fa-mobile-alt"></i> Phone Covers</a></li>
                <li><a href="ladies-dress.html" class="active"><i class="fas fa-tshirt"></i> Ladies Dress</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="container">
        <div class="breadcrumb">
            <a href="../index.html">Home</a> <span>/</span> <strong>Ladies Dress</strong>
        </div>
    </div>

    <!-- Page Content -->
    <section class="page-content">
        <div class="container">
            <div class="page-layout">
                <!-- Sidebar Filters -->
                <aside class="sidebar">
                    <div class="filter-group">
                        <h3><i class="fas fa-ruler"></i> Size</h3>
                        <label><input type="checkbox" name="size" value="S"> S (Small)</label>
                        <label><input type="checkbox" name="size" value="M"> M (Medium)</label>
                        <label><input type="checkbox" name="size" value="L"> L (Large)</label>
                        <label><input type="checkbox" name="size" value="XL"> XL (Extra Large)</label>
                        <label><input type="checkbox" name="size" value="XXL"> XXL</label>
                        <label><input type="checkbox" name="size" value="3XL"> 3XL</label>
                        <label><input type="checkbox" name="size" value="Free Size"> Free Size</label>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-palette"></i> Color</h3>
                        <div class="color-options">
                            <div class="color-swatch" style="background: #000000;" data-color="Black" title="Black"></div>
                            <div class="color-swatch" style="background: #ffffff; border-color: #ccc;" data-color="White" title="White"></div>
                            <div class="color-swatch" style="background: #c62828;" data-color="Red" title="Red"></div>
                            <div class="color-swatch" style="background: #1565c0;" data-color="Blue" title="Blue"></div>
                            <div class="color-swatch" style="background: #2e7d32;" data-color="Green" title="Green"></div>
                            <div class="color-swatch" style="background: #e91e63;" data-color="Pink" title="Pink"></div>
                            <div class="color-swatch" style="background: #7b1fa2;" data-color="Purple" title="Purple"></div>
                            <div class="color-swatch" style="background: #ffd700;" data-color="Gold" title="Gold"></div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-tag"></i> Price Range</h3>
                        <div class="price-range">
                            <input type="number" id="minPrice" placeholder="Min" min="0">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" min="0">
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-tshirt"></i> Style</h3>
                        <label><input type="checkbox" name="style" value="Maxi"> Maxi</label>
                        <label><input type="checkbox" name="style" value="Mini"> Mini</label>
                        <label><input type="checkbox" name="style" value="Midi"> Midi</label>
                        <label><input type="checkbox" name="style" value="Kurti"> Kurti</label>
                    </div>

                    <button class="filter-btn" onclick="applyFilters()">
                        <i class="fas fa-filter"></i> Apply Filters
                    </button>
                    <button class="filter-btn" style="background: #666; margin-top: 5px;" onclick="clearFilters()">
                        <i class="fas fa-times"></i> Clear All
                    </button>
                </aside>

                <!-- Products -->
                <div class="main-content">
                    <div class="sort-bar">
                        <span class="results-count" id="resultsCount">8 products found</span>
                        <select id="sortSelect" onchange="sortProducts()">
                            <option value="popular">Most Popular</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Highest Rating</option>
                        </select>
                    </div>
                    <div class="product-grid" id="productGrid">
                        <!-- Products loaded by JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ShopZone. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/ladies-dress.js"></script>
</body>
</html>
