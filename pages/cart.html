<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - ShopZone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <span><i class="fas fa-truck"></i> Free Shipping on orders over ৳500</span>
            </div>
            <div class="top-bar-right">
                <a href="#"><i class="fas fa-user"></i> Login</a>
                <a href="#"><i class="fas fa-user-plus"></i> Register</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">
                    <span class="logo-text">Shop<span class="logo-highlight">Zone</span></span>
                </a>
                <div class="search-bar">
                    <input type="text" placeholder="Search products..." id="searchInput">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Navigation -->
    <nav class="category-nav">
        <div class="container">
            <ul class="nav-list">
                <li><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="phone-covers.html"><i class="fas fa-mobile-alt"></i> Phone Covers</a></li>
                <li><a href="ladies-dress.html"><i class="fas fa-tshirt"></i> Ladies Dress</a></li>
                <li><a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="container">
        <div class="breadcrumb">
            <a href="../index.html">Home</a> <span>/</span> <strong>Shopping Cart</strong>
        </div>
    </div>

    <!-- Cart Content -->
    <section class="cart-page">
        <div class="container">
            <div class="cart-container">
                <div class="cart-header">
                    <h1><i class="fas fa-shopping-cart"></i> Shopping Cart</h1>
                    <button onclick="clearCart()" style="background: none; border: 1px solid #ddd; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; color: #666;">
                        <i class="fas fa-trash"></i> Clear All
                    </button>
                </div>
                
                <div id="cartItems">
                    <!-- Cart items loaded by JS -->
                </div>

                <div id="cartSummary" class="cart-summary" style="display: none;">
                    <div class="cart-total">
                        Total: <span id="cartTotal">৳0</span>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">
                        <i class="fas fa-lock"></i> Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ShopZone. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/cart-page.js"></script>
</body>
</html>
