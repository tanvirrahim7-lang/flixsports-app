<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Covers - ShopZone</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-left">
                <span><i class="fas fa-truck"></i> Free Shipping on orders over ৳500</span>
            </div>
            <div class="top-bar-right">
                <a href="#"><i class="fas fa-user"></i> Login</a>
                <a href="#"><i class="fas fa-user-plus"></i> Register</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="logo">
                    <span class="logo-text">Shop<span class="logo-highlight">Zone</span></span>
                </a>
                <div class="search-bar">
                    <input type="text" placeholder="Search phone covers..." id="searchInput">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Navigation -->
    <nav class="category-nav">
        <div class="container">
            <ul class="nav-list">
                <li><a href="../index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="phone-covers.html" class="active"><i class="fas fa-mobile-alt"></i> Phone Covers</a></li>
                <li><a href="ladies-dress.html"><i class="fas fa-tshirt"></i> Ladies Dress</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="container">
        <div class="breadcrumb">
            <a href="../index.html">Home</a> <span>/</span> <strong>Phone Covers</strong>
        </div>
    </div>

    <!-- Page Content -->
    <section class="page-content">
        <div class="container">
            <div class="page-layout">
                <!-- Sidebar Filters -->
                <aside class="sidebar">
                    <div class="filter-group">
                        <h3><i class="fas fa-mobile-alt"></i> Phone Model</h3>
                        <label><input type="checkbox" name="model" value="iPhone 15"> iPhone 15</label>
                        <label><input type="checkbox" name="model" value="iPhone 15 Pro"> iPhone 15 Pro</label>
                        <label><input type="checkbox" name="model" value="iPhone 15 Pro Max"> iPhone 15 Pro Max</label>
                        <label><input type="checkbox" name="model" value="iPhone 14"> iPhone 14</label>
                        <label><input type="checkbox" name="model" value="iPhone 14 Pro"> iPhone 14 Pro</label>
                        <label><input type="checkbox" name="model" value="iPhone 13"> iPhone 13</label>
                        <label><input type="checkbox" name="model" value="Samsung S24"> Samsung S24</label>
                        <label><input type="checkbox" name="model" value="Samsung S24 Ultra"> Samsung S24 Ultra</label>
                        <label><input type="checkbox" name="model" value="Samsung S23"> Samsung S23</label>
                        <label><input type="checkbox" name="model" value="Samsung A54"> Samsung A54</label>
                        <label><input type="checkbox" name="model" value="Samsung A34"> Samsung A34</label>
                        <label><input type="checkbox" name="model" value="Xiaomi 14"> Xiaomi 14</label>
                        <label><input type="checkbox" name="model" value="Xiaomi 13"> Xiaomi 13</label>
                        <label><input type="checkbox" name="model" value="Oppo Reno 11"> Oppo Reno 11</label>
                        <label><input type="checkbox" name="model" value="Vivo V30"> Vivo V30</label>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-palette"></i> Color</h3>
                        <div class="color-options">
                            <div class="color-swatch" style="background: #000000;" data-color="Black" title="Black"></div>
                            <div class="color-swatch" style="background: #ffffff; border-color: #ccc;" data-color="White" title="White"></div>
                            <div class="color-swatch" style="background: #1a237e;" data-color="Blue" title="Blue"></div>
                            <div class="color-swatch" style="background: #b71c1c;" data-color="Red" title="Red"></div>
                            <div class="color-swatch" style="background: #1b5e20;" data-color="Green" title="Green"></div>
                            <div class="color-swatch" style="background: #4a148c;" data-color="Purple" title="Purple"></div>
                            <div class="color-swatch" style="background: #ff6f00;" data-color="Orange" title="Orange"></div>
                            <div class="color-swatch" style="background: #ffcdd2;" data-color="Pink" title="Pink"></div>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-tag"></i> Price Range</h3>
                        <div class="price-range">
                            <input type="number" id="minPrice" placeholder="Min" min="0">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" min="0">
                        </div>
                    </div>

                    <div class="filter-group">
                        <h3><i class="fas fa-layer-group"></i> Case Type</h3>
                        <label><input type="checkbox" name="type" value="silicone"> Silicone</label>
                        <label><input type="checkbox" name="type" value="transparent"> Transparent</label>
                        <label><input type="checkbox" name="type" value="leather"> Leather</label>
                        <label><input type="checkbox" name="type" value="armor"> Armor/Heavy Duty</label>
                        <label><input type="checkbox" name="type" value="cute"> Cute/Character</label>
                        <label><input type="checkbox" name="type" value="magnetic"> Magnetic/MagSafe</label>
                    </div>

                    <button class="filter-btn" onclick="applyFilters()">
                        <i class="fas fa-filter"></i> Apply Filters
                    </button>
                    <button class="filter-btn" style="background: #666; margin-top: 5px;" onclick="clearFilters()">
                        <i class="fas fa-times"></i> Clear All
                    </button>
                </aside>

                <!-- Products -->
                <div class="main-content">
                    <div class="sort-bar">
                        <span class="results-count" id="resultsCount">8 products found</span>
                        <select id="sortSelect" onchange="sortProducts()">
                            <option value="popular">Most Popular</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Highest Rating</option>
                            <option value="newest">Newest</option>
                        </select>
                    </div>
                    <div class="product-grid" id="productGrid">
                        <!-- Products loaded by JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 ShopZone. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/phone-covers.js"></script>
</body>
</html>
