plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.sutro.sports'

    defaultConfig {
        applicationId "com.sutro.sports"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {}
